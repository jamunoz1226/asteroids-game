  <!DOCTYPE html>
<html>
<head>
 <title>Smooth Move</title>
  <link rel="stylesheet" href="style.css">



</head>


<body>
  <div id="instruction-popup" class="popup-overlay">
    <div class="popup-box">
        <h2>SYSTEM INITIALIZATION</h2>
        <p>We Need Your Help Young Soldier!</p>
        <p>Your Mission is to Protect Earth From Uncoming Meteors.</p>
        <p>Do Not Let The Asteroid Hit us or We would be Done For </p>
        <p> Some are Stronger then other Beware </p>

        
        <button class="play-btn" onclick="startGame()">
          I UNDERSTAND - INITIATE
      </button>
    </div>
</div>

<div id="game-over-popup" class="popup-overlay" style="display: none;">
  <div class="popup-box">
      <h2 style="color: #ff4c4c; text-shadow: 0 0 10px rgba(255, 76, 76, 0.5);">CRITICAL FAILURE</h2>
      <p>An asteroid has hit Earth! The system has been compromised.</p>
      <p id="final-score" style="font-size: 2rem; font-weight: bold; color: white;"></p>
      
      <button class="play-btn" onclick="location.reload()" style="background-color: #ff4c4c; box-shadow: 0 0 15px rgba(255, 76, 76, 0.4);">
          RESTART SYSTEM
      </button>
  </div>
</div>

 <!-- Score display -->
 <div id="score">Score: 0</div>
  
 <script src="jsfile.js"></script>

 

</body>
</html>
